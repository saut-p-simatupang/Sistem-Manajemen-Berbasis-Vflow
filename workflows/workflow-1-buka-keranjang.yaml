dialect: vflow
version: "3.0"
metadata:
  name: w1-buka-keranjang
activities:
  - id: start_trigger
    type: Trigger
    properties:
      type: webhook
      runtime_mode: fastpath # Mengaktifkan mode FastPath
  - id: insert_db
    type: Connector
    properties:
      connector_ref: "pack://umkm/db"
      query: "INSERT INTO pesanan (id_pelanggan, status, subtotal, total_harga) VALUES (:pelanggan_id, 'pending', 0, 0) RETURNING id;"
  - id: transform_response
    type: Transform
    properties:
      expression_language: v-cel
      mapping:
        status: "'success'"
        pesanan_id: "activity.insert_db.result[0].id"
        message: "'Keranjang berhasil dibuka'"
  - id: end_response
    type: EndTrigger
