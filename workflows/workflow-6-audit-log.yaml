dialect: vflow
version: "3.0"
metadata:
  name: w6-audit-log
spec:
  activities:
    - id: event_trigger
      activity_type: Trigger
      properties:
        type: detached_edge
        runtime_mode: fastpath
    - id: write_log
      activity_type: Connector
      properties:
        connector_ref: "pack://umkm/db"
        query: "INSERT INTO audit_log (event_type, payload) VALUES (:aktivitas_tipe, :payload_log);"
    - id: end_response
      activity_type: EndTrigger
  flows:
    - { id: f1, from: { node: event_trigger }, to: { node: write_log } }
    - { id: f2, from: { node: write_log }, to: { node: end_response } }
