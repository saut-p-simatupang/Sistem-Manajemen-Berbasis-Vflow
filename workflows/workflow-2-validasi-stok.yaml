dialect: vflow
version: "3.0"
metadata:
  name: w2-validasi-stok
spec:
  activities:
    - id: start_trigger
      activity_type: Trigger
      properties:
        type: webhook
        runtime_mode: fastpath
    - id: check_stok
      activity_type: Connector
      properties:
        connector_ref: "pack://umkm/db"
        query: "SELECT stok FROM produk WHERE id = :produk_id;"
    - id: check_gateway
      activity_type: ExclusiveGateway
      properties:
        conditions:
          - expression: "activity.check_stok.result[0].stok >= input.jumlah"
            transition_to: transform_tersedia
        default: transform_habis
    - id: transform_tersedia
      activity_type: Transform
      properties:
        expression_language: v-cel
        mapping:
          tersedia: true
          message: "'Stok tersedia'"
    - id: transform_habis
      activity_type: Transform
      properties:
        expression_language: v-cel
        mapping:
          tersedia: false
          message: "'Stok tidak mencukupi'"
    - id: end_response
      activity_type: EndTrigger
  flows:
    - { id: f1, from: { node: start_trigger }, to: { node: check_stok } }
    - { id: f2, from: { node: check_stok }, to: { node: check_gateway } }
    - {
        id: f3,
        from: { node: check_gateway },
        to: { node: transform_tersedia },
      }
    - { id: f4, from: { node: check_gateway }, to: { node: transform_habis } }
    - { id: f5, from: { node: transform_tersedia }, to: { node: end_response } }
    - { id: f6, from: { node: transform_habis }, to: { node: end_response } }
