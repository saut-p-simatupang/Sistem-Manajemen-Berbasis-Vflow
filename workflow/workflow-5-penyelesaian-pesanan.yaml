dialect: vflow
version: "3.0"
metadata:
  name: w5-penyelesaian-pesanan
activities:
  - id: start_trigger
    type: Trigger
    properties:
      type: webhook
      runtime_mode: fastpath
  - id: settle_pesanan
    type: Connector
    properties:
      connector_ref: "pack://umkm/db"
      query: "UPDATE pesanan SET status = 'selesai', metode_pengambilan = :metode_pengambilan WHERE id = :pesanan_id;"
  - id: reduce_stok
    type: Connector
    properties:
      connector_ref: "pack://umkm/db"
      query: "UPDATE produk SET stok = stok - :kuantitas WHERE id = :produk_id;"
  - id: transform_final
    type: Transform
    properties:
      expression_language: v-cel
      mapping:
        status: "'completed'"
        message: "'Pesanan selesai dan stok berhasil diperbarui'"
  - id: end_response
    type: EndTrigger
